<!DOCTYPE html>
<html>
<head>
<title>Registration Successful</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:120px;
background:#f5f7fa;
}

.container{
background:white;
padding:40px;
width:450px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:12px 25px;
font-size:16px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#43a047;
}
</style>

</head>

<body>

<div class="container">

<h2>✅ {{ service }} Completed Successfully!</h2>

<p>Your details have been saved in the MediPortal system.</p>

<a href="{{ url_for('download_receipt',
service=service,
name=name,
blood_type=blood_type,
organ_type=organ_type,
age=age,
location=location,
phone=phone,
hospital=hospital,
urgency=urgency,
last_donation_date=last_donation_date) }}">

<button>Download Receipt</button>

</a>

</div>

</body>
</html>
