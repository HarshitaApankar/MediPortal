{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h1>Settings</h1>

    <h3>Change Password</h3>

    <form method="POST">
        <input type="password" name="old_password" placeholder="Current Password" required style="width:100%; padding:10px; margin:10px 0;"><br>
        
        <input type="password" name="new_password" placeholder="New Password" required style="width:100%; padding:10px; margin:10px 0;"><br>
        
        <button type="submit" style="padding:10px 20px; background:#2c3e50; color:white; border:none; border-radius:5px;">
            Update Password
        </button>
    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p style="color:green;">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

</div>

{% endblock %}
