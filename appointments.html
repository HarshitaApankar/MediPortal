{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h1>Appointments</h1>

    <!-- 🔥 Book Appointment Section -->
    <h2 style="margin-top:20px;">Book Appointment</h2>

    <form method="POST" style="margin-bottom:30px;">

        <div style="margin-bottom:10px;">
            <label>Doctor Name</label><br>
            <input type="text" name="doctor_name" required 
                   style="width:100%; padding:8px;">
        </div>

        <div style="margin-bottom:10px;">
            <label>Date</label><br>
            <input type="date" name="date" required 
                   style="width:100%; padding:8px;">
        </div>

        <div style="margin-bottom:10px;">
            <label>Time</label><br>
            <input type="time" name="time" required 
                   style="width:100%; padding:8px;">
        </div>

        <button type="submit" 
                style="padding:10px 20px; background:#2c3e50; color:white; border:none; cursor:pointer;">
            Book Appointment
        </button>

    </form>

    <hr style="margin:30px 0;">

    <!-- 📋 Appointment List -->
    <h2>Your Appointments</h2>

    {% if data %}
    <table style="width:100%; border-collapse: collapse;">
        <tr style="background:#2c3e50; color:white;">
            <th style="padding:10px;">Doctor</th>
            <th style="padding:10px;">Date</th>
            <th style="padding:10px;">Time</th>
        </tr>

        {% for row in data %}
        <tr style="text-align:center; border-bottom:1px solid #ddd;">
            <td style="padding:10px;">{{ row[0] }}</td>
            <td style="padding:10px;">{{ row[1] }}</td>
            <td style="padding:10px;">{{ row[2] }}</td>
        </tr>
        {% endfor %}
    </table>

    {% else %}
        <p>No appointments found</p>
    {% endif %}
</div>

{% endblock %}
