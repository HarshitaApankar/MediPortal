<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blood Donor - MediPortal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
    <div class="logo">MediPortal</div>
    <ul>
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('services') }}">Services</a></li>
        <li><a href="{{ url_for('emergency') }}">Emergency</a></li>
        
        <!-- Updated with url_for -->
        
        <li><a href="{{ url_for('hospitals') }}">Hospitals</a></li>
        <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
        <li><a href="{{ url_for('blog') }}">Blogs</a></li>

        {% if session.get('user_id') %}
            <li><a href="{{ url_for('logout') }}">Logout</a></li>
        {% else %}
            <li><a href="{{ url_for('login') }}">Login</a></li>
            <li><a href="{{ url_for('signup') }}">Signup</a></li>
        {% endif %}
    </ul>
</nav>
<div class="form-box">
<h2 style="color: var(--pastel-pink);">Blood Donor Registration</h2>

<form method="POST" action="{{ url_for('blood_donor') }}">

<input type="text" name="full_name" placeholder="Full Name" required>

<input type="text" name="address" placeholder="Address" required>

<input type="text" name="aadhaar" placeholder="Aadhaar Number" required>

<input type="text" name="hospital" placeholder="Preferred Hospital">

<label>Any Disease?</label>
<select name="disease">
<option value="None">None</option>
<option value="Diabetes">Diabetes</option>
<option value="Blood Pressure">Blood Pressure</option>
<option value="Heart Disease">Heart Disease</option>
<option value="Other">Other</option>
</select>

<select name="blood_type" required>
<option value="">Select Blood Type</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<input type="number" name="age" placeholder="Age" required>

<input type="text" name="location" placeholder="Location" required>

<input type="text" name="phone" placeholder="Phone Number" required>

<input type="date" name="last_donation_date">

<button type="submit">Register as Donor</button>

</form>
</div>
    
    
</body>
</html>
